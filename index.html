<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radar de Compras Públicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <script>
      fetch('/data-netlify.html')
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var doc = new DOMParser().parseFromString(html, 'text/html');
          var rcScript = doc.querySelector('script[src*="recaptcha"]');
          var rcDiv = doc.querySelector('.g-recaptcha');
          if (rcScript) {
            var s = document.createElement('script');
            s.src = rcScript.getAttribute('src');
            s.async = true;
            document.head.appendChild(s);
          }
          if (rcDiv) {
            window.__rcSitekey = rcDiv.dataset.sitekey;
          }
        });
    </script>
    <form name="subscription_herramientas_ocds" netlify data-netlify-recaptcha="true" hidden>
      <input type="email" name="email" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
